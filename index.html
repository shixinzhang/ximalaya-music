<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>喜马拉雅 - 听歌</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <!-- 新人引导遮罩 -->
    <div id="guide-overlay" class="guide-overlay hidden">
        <div class="guide-bubble">
            <p>海量音乐一键免费听</p>
            <div class="guide-arrow"></div>
        </div>
        <button class="guide-close" onclick="closeGuide()">知道了</button>
    </div>

    <!-- 主体内容 -->
    <div class="app-container">
        <!-- 顶部 Tab 栏 -->
        <div class="tab-header">
            <div class="tab-scroll">
                <div class="tab-item active" data-tab="recommend">推荐</div>
                <div class="tab-item" data-tab="classic">经典老歌</div>
                <div class="tab-item" data-tab="pop">流行热歌</div>
                <div class="tab-item" data-tab="sleep">助眠音乐</div>
                <div class="tab-item" data-tab="white">自然白噪音</div>
                <div class="tab-item heart-tab hidden" data-tab="heart">心动模式</div>
            </div>
        </div>

        <!-- 页面内容 -->
        <div class="content-area">

            <!-- 正在播放 feed -->
            <div id="now-playing-view" class="now-playing-view">
                <div class="np-scroll-container" id="np-scroll-container">
                    <!-- 10 cards injected by JS -->
                </div>
            </div>

            <!-- 推荐 Tab -->
            <div class="tab-content active" id="recommend">
                <!-- 主页大卡片播放器 -->
                <div class="hero-player" onclick="playHero()">
                    <div class="hero-cover">
                        <img id="hero-cover-img" src="https://picsum.photos/seed/hero1/400/250" alt="cover">
                        <div class="hero-cover-overlay"></div>
                        <div class="hero-play-btn">
                            <i class="fas fa-play"></i>
                        </div>
                    </div>
                    <div class="hero-info">
                        <div class="hero-title" id="hero-title">适合一个人听的经典老歌</div>
                        <div class="hero-artist" id="hero-artist">每日更新30首</div>
                    </div>
                </div>
                <!-- 歌曲列表 -->
                <div class="song-list" id="recommend-list"></div>
            </div>

            <!-- 经典老歌 -->
            <div class="tab-content" id="classic">
                <div class="song-list" id="classic-list"></div>
            </div>

            <!-- 流行热歌 -->
            <div class="tab-content" id="pop">
                <div class="song-list" id="pop-list"></div>
            </div>

            <!-- 助眠音乐 -->
            <div class="tab-content" id="sleep">
                <div class="song-list" id="sleep-list"></div>
            </div>

            <!-- 自然白噪音 -->
            <div class="tab-content" id="white">
                <div class="song-list" id="white-list"></div>
            </div>

            <!-- 心动模式 -->
            <div class="tab-content" id="heart">
                <div class="heart-header">
                    <i class="fas fa-heart"></i>
                    <span>你喜欢的音乐和相似推荐</span>
                </div>
                <div class="song-list" id="heart-list"></div>
            </div>
        </div>

        <!-- 底部导航 -->
        <div class="bottom-nav">
            <div class="nav-item">
                <i class="fas fa-home"></i>
                <span>首页</span>
            </div>
            <div class="nav-item active" id="music-listen-nav" onclick="showNowPlaying()">
                <i class="fas fa-headphones-alt"></i>
                <span>听音乐</span>
            </div>
            <div class="nav-center-item">
                <button class="center-play-btn" id="center-play-btn" onclick="togglePlay()">
                    <i class="fas fa-play" id="center-play-icon"></i>
                </button>
            </div>
            <div class="nav-item" id="subscribe-nav">
                <i class="fas fa-bookmark"></i>
                <span>订阅</span>
            </div>
            <div class="nav-item">
                <i class="fas fa-user"></i>
                <span>我的</span>
            </div>
        </div>
    </div>

    <!-- 更多操作面板 -->
    <div class="loop-modal" id="loop-modal" onclick="handleLoopModalBgClick(event)">
        <div class="loop-content">

            <!-- 歌曲信息头 -->
            <div class="loop-song-header">
                <div class="loop-song-thumb">
                    <img id="loop-song-img" src="" alt="">
                </div>
                <div class="loop-song-meta">
                    <h4 id="loop-song-title">--</h4>
                    <p>专辑：<span id="loop-song-artist">--</span> <i class="fas fa-chevron-right"></i></p>
                </div>
            </div>

            <!-- 第一区：收藏 / 待播 -->
            <div class="loop-section">
                <div class="loop-row loop-row-clickable">
                    <div class="loop-row-left">
                        <i class="far fa-star loop-plain-icon"></i>
                        <span>收藏声音</span>
                    </div>
                </div>
                <div class="loop-row loop-row-clickable">
                    <div class="loop-row-left">
                        <i class="fas fa-bars-staggered loop-plain-icon"></i>
                        <span>添加待播</span>
                    </div>
                </div>
            </div>

            <!-- 第二区：播放设置 -->
            <div class="loop-section">
                <div class="loop-row loop-row-clickable" onclick="cycleTimer()">
                    <div class="loop-row-left">
                        <i class="far fa-clock loop-plain-icon"></i>
                        <span>定时关闭</span>
                    </div>
                    <span class="loop-row-value timer-display" id="timer-display">关闭</span>
                </div>

                <div class="loop-row">
                    <div class="loop-row-left">
                        <i class="fas fa-gauge-high loop-plain-icon"></i>
                        <span>播放速度</span>
                    </div>
                    <div class="speed-chips" id="speed-chips">
                        <span class="speed-chip" data-speed="0.8" onclick="selectSpeed(0.8)">0.8</span>
                        <span class="speed-chip active" data-speed="1.0" onclick="selectSpeed(1.0)">1.0</span>
                        <span class="speed-chip" data-speed="1.2" onclick="selectSpeed(1.2)">1.2</span>
                        <span class="speed-chip" data-speed="1.5" onclick="selectSpeed(1.5)">1.5</span>
                        <span class="speed-chip speed-chip-custom">自定义 <i class="fas fa-chevron-right"></i></span>
                    </div>
                </div>

                <div class="loop-row loop-row-clickable" onclick="cycleLoopMode()">
                    <div class="loop-row-left">
                        <i class="fas fa-repeat loop-plain-icon" id="loop-mode-icon"></i>
                        <span>循环模式</span>
                    </div>
                    <div class="loop-row-right-group">
                        <span class="loop-row-value" id="loop-mode-label">顺序播放</span>
                        <i class="fas fa-chevron-right loop-chevron"></i>
                    </div>
                </div>

                <div class="loop-row">
                    <div class="loop-row-left">
                        <i class="fas fa-forward-step loop-plain-icon"></i>
                        <span>播放时默认跳过片头</span>
                    </div>
                    <label class="toggle-switch" onclick="event.stopPropagation()">
                        <input type="checkbox" id="skip-intro-toggle" checked>
                        <span class="toggle-slider"></span>
                    </label>
                </div>

                <div class="loop-row" style="border-bottom: none">
                    <div class="loop-row-left">
                        <i class="fas fa-layer-group loop-plain-icon"></i>
                        <span>与其他应用同时播放</span>
                    </div>
                    <label class="toggle-switch" onclick="event.stopPropagation()">
                        <input type="checkbox" id="coplay-toggle">
                        <span class="toggle-slider"></span>
                    </label>
                </div>
            </div>

            <button class="loop-close" onclick="closeLoopSettings()">取消</button>
        </div>
    </div>

    <!-- 点赞引导气泡 -->
    <div class="like-guide" id="like-guide">
        <div class="like-bubble">
            <p>点赞后会推荐更多相似音乐</p>
        </div>
    </div>

    <!-- 心动模式引导 -->
    <div class="heart-guide" id="heart-guide">
        <div class="heart-bubble">
            <p>你喜欢的音乐和相似推荐</p>
            <div class="bubble-arrow"></div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
